<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bay Bay Capital — Factoring</title>
<style>
  :root{
    --ink:#000000;
    --ink-soft:#0E0E0E;
    --paper:#000000;
    --paper-raised:#0C0C0C;
    --gold:#FFFFFF;
    --gold-bright:#FFFFFF;
    --charcoal:#F5F5F5;
    --muted:#8A8A8A;
    --line:#2A2A2A;
    --line-soft:#1C1C1C;
    --success:#7Fd49b;
    --success-bg:#11261A;
    --amber:#E0A24B;
    --amber-bg:#2A2012;
    --rust:#E8745F;
    --rust-bg:#2A1512;
    --serif:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;
    --sans:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;
    --mono:"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#000000;
    color:#F5F5F5;
    font-family:var(--sans);
    font-size:14px;
    line-height:1.5;
  }
  .app{max-width:1180px;margin:0 auto;}
  .topbar{
    background:#000000;
    color:#FFFFFF;
    padding:18px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid #2A2A2A;
  }
  .brand{
    font-family:var(--sans);
    font-size:17px;
    font-weight:900;
    letter-spacing:0.06em;
    display:flex;
    align-items:baseline;
    gap:12px;
  }
  .brand .mark{color:#FFFFFF;font-weight:900;}
  .brand .sub{font-size:10px;letter-spacing:0.22em;color:#8A8A8A;text-transform:uppercase;font-family:var(--sans);font-weight:600;}
  nav{display:flex;gap:4px;}
  nav button{
    background:transparent;
    border:1px solid transparent;
    color:#8A8A8A;
    font-family:var(--sans);
    font-size:12px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:8px 16px;
    border-radius:2px;
    cursor:pointer;
  }
  nav button:hover{color:#FFFFFF;background:rgba(255,255,255,0.06);}
  nav button.active{color:#000000;background:#FFFFFF;}
  main{padding:48px 28px;}
  .view{display:none;}
  .view.active{display:block;}
  h1.page-title{
    font-family:var(--sans);
    font-size:30px;
    font-weight:700;
    letter-spacing:-0.02em;
    margin:0 0 8px;
    color:#FFFFFF;
  }
  .page-sub{color:var(--muted);font-size:14px;margin:0 0 32px;line-height:1.5;}
  .card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:14px;
    padding:28px 30px;
    margin-bottom:20px;
  }
  .card h2{
    font-family:var(--sans);
    font-size:15px;
    font-weight:800;
    letter-spacing:0.01em;
    color:#FFFFFF;
    margin:0 0 14px;
    padding-bottom:10px;
    border-bottom:1px solid var(--line-soft);
    display:flex;
    align-items:center;

  }
  .step-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line-soft);}
  .step-head h2{margin:0;padding-bottom:0;border-bottom:none;}
  .step-num{
    flex:none;width:26px;height:26px;border-radius:50%;

    font-family:var(--sans);font-weight:800;font-size:14px;

  .opt-details summary::-webkit-details-marker{display:none;}

    display:block;font-size:11.5px;letter-spacing:0.04em;text-transform:uppercase;
    color:var(--muted);margin:18px 0 8px;
  }
  .tarifa-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px;}

  .tarifa-card-pct{font-family:var(--mono);font-size:16px;color:#FFFFFF;font-weight:700;margin-bottom:3px;}

  .wiz-wrap{max-width:560px;margin:0 auto;}
  .wiz-progress{height:3px;background:var(--line-soft);border-radius:0;overflow:hidden;margin-bottom:8px;}
  .wiz-progress-bar{height:100%;background:#FFFFFF;transition:width .25s;}

  }
  #login-screen{
    position:fixed;inset:0;background:#000000;
    display:flex;align-items:center;justify-content:center;z-index:100;
  }
  .login-card{
    width:330px;background:#0C0C0C;border-radius:16px;

  .login-brand{font-family:var(--sans);font-weight:900;font-size:25px;letter-spacing:0.04em;color:#FFFFFF;text-align:center;margin-bottom:2px;line-height:1.1;}
  .login-brand .mark{color:#FFFFFF;font-weight:900;}
  .login-sub{text-align:center;color:var(--muted);font-size:12px;margin:0 0 20px;text-transform:uppercase;letter-spacing:0.08em;}
  .login-error{color:var(--rust);font-size:12.5px;margin:-4px 0 12px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  .field{margin-bottom:14px;}

  .btn{
    font-family:var(--sans);
    font-size:13px;
    font-weight:600;
    letter-spacing:0.02em;
    text-transform:none;

    background:transparent;

  .btn.gold:hover{background:#E0E0E0;}
  .btn.ghost{background:transparent;color:#FFFFFF;border-color:var(--line);}
  .btn.ghost:hover{background:rgba(255,255,255,0.08);}
  .btn.small{padding:6px 12px;font-size:11px;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}

    text-align:left;
    font-size:10px;

    font-size:11px;

  .pill.t3{background:var(--rust-bg);color:var(--rust);}
  .pill.paid{background:var(--success-bg);color:var(--success);}
  .pill.pending{background:#1E1A2E;color:#A99BE0;}
  .pill.draft{background:var(--line-soft);color:var(--muted);}
  .kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px;}
  .kpi{
    background:var(--paper-raised);
    border:1px solid var(--line);

  .kpi .value{font-family:var(--sans);font-weight:800;font-size:24px;color:#FFFFFF;}
  .kpi .value.gold{color:#FFFFFF;}
  .escalation{display:flex;align-items:center;gap:6px;width:100%;}
  .escalation .seg{height:6px;border-radius:3px;background:var(--line);position:relative;}
  .escalation .seg.t1{background:#2E4A38;}
  .escalation .seg.t2{background:#4A3A1E;}
  .escalation .seg.t3{background:#4A2018;}
  .escalation .seg.active{box-shadow:inset 0 0 0 1.5px #FFFFFF;}
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,0.7);
    display:flex;align-items:flex-start;justify-content:center;
    padding:40px 20px;overflow-y:auto;z-index:50;
  }
  .modal{
    background:#0C0C0C;
    border:1px solid var(--line);
    border-radius:16px;
    max-width:760px;width:100%;
    padding:0;
    max-height:90vh;
    display:flex;flex-direction:column;

  .modal-head{
    padding:18px 24px;border-bottom:1px solid var(--line);

  .modal-body{padding:20px 24px;overflow-y:auto;}

  .doc-tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap;}
  .doc-tabs button{
    background:transparent;border:none;padding:9px 14px;font-size:12px;

  }
  .doc-tabs button.active{color:#FFFFFF;border-bottom-color:#FFFFFF;font-weight:700;}
  .doc-page{
    background:#fff;border:1px solid var(--line);
    padding:48px 56px;font-family:Georgia,"Times New Roman",serif;
    font-size:13px;line-height:1.65;color:#1A1812;
    max-width:680px;margin:0 auto;
  }
  .doc-page h3.doc-title{text-align:center;font-size:16px;letter-spacing:0.03em;margin:0 0 4px;}
  .doc-page p.doc-sub{text-align:center;font-size:12px;font-style:italic;margin:0 0 26px;color:#444;}
  .doc-page p{text-align:justify;margin:0 0 14px;}
  .doc-page table{width:100%;border-collapse:collapse;font-size:11.5px;margin:14px 0 18px;}
  .doc-page table th,.doc-page table td{border:1px solid #999;padding:6px 8px;text-align:center;}
  .doc-page table th{background:#EFEAD9;}
  .doc-page .sig-block{margin-top:48px;display:flex;gap:40px;}
  .doc-page .sig-line{flex:1;border-top:1px solid #333;padding-top:6px;font-size:11.5px;text-align:center;}
  .empty{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty i{font-size:13px;}
  .toast{
    position:fixed;bottom:24px;right:24px;background:#FFFFFF;color:#000000;

    .topbar,nav,.no-print,#tap-diag,#fatal-error-banner{display:none !important;}

    main{padding:0;}
    .doc-page{border:none;padding:0;max-width:none;background:#fff !important;color:#000 !important;}
  }
</style>

<script id="app-script">
/* ============ ERROR VISIBILITY (must run first) ============ */
(function () {
  function showFatalError(msg) {
    if (!document.body) { setTimeout(() => showFatalError(msg), 50); return; }
    let banner = document.getElementById('fatal-error-banner');
    if (!banner) {
      banner = document.createElement('div');
      banner.id = 'fatal-error-banner';
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#8C3B2E;color:#fff;padding:14px 18px;font-family:monospace;font-size:13px;white-space:pre-wrap;';
      document.body.prepend(banner);
    }
    banner.textContent = 'Application error (copy and send this message): ' + msg;
  }
  window.addEventListener('error', (e) => showFatalError(e.message + ' (line ' + e.lineno + ')'));
  window.addEventListener('unhandledrejection', (e) => showFatalError(String(e.reason)));
})();

/* ============ SESSION / USERS ============ */
// Two users. "1" is master (can delete). "v" can do everything except delete.
let CURRENT_USER = null;          // '1' or 'v'
function isMaster() { return CURRENT_USER === '1'; }

/* ============ STORAGE (NUMBERS ONLY — no names or cédulas) ============
   The dashboard stores ONLY non-identifying financials. Names and cédulas
   are collected in the wizard, used to generate + email the documents, and
   then discarded. Nothing sensitive is ever written to storage.

   STORAGE ADAPTER: inside Claude's preview, window.storage exists (and is
   shared between users). On a normal web host (GitHub Pages, etc.) it does
   NOT exist, so we fall back to the browser's localStorage. Note: localStorage
   is per-device — it does NOT sync between two people on different computers.
   True cross-device sync needs a small backend (e.g. Firebase/Supabase). */
const STORAGE_KEY = 'bbf-ledger-v1';
let DEALS = [];
let CURRENT_VIEW = 'nuevo';
let DETAIL_DEAL_ID = null;

function hasClaudeStorage() {
  return typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function';
}

async function storageGetRaw() {
  if (hasClaudeStorage()) {
    const res = await window.storage.get(STORAGE_KEY, true);
    return res && res.value ? res.value : null;
  }
  try { return localStorage.getItem(STORAGE_KEY); } catch (e) { return null; }
}

async function storageSetRaw(value) {
  if (hasClaudeStorage()) {
    await window.storage.set(STORAGE_KEY, value, true);
    return;
  }
  try { localStorage.setItem(STORAGE_KEY, value); } catch (e) { /* ignore */ }
}

async function loadDeals() {
  try {
    const raw = await storageGetRaw();
    DEALS = raw ? JSON.parse(raw) : [];
  } catch (e) {
    DEALS = [];
  }
  if (DEALS.length === 0) {
    DEALS = [seedDeal()];
    await saveDeals();
  }
}

async function saveDeals() {
  try {
    await storageSetRaw(JSON.stringify(DEALS));
  } catch (e) {
    showToast('Could not save. Please try again.');
  }
}

function nextOpNumber() {
  const nums = DEALS.map(d => d.opNumber || 0);
  return (nums.length ? Math.max(...nums) : 0) + 1;
}

// Seed record = the real first deal, but stored as NUMBERS ONLY (no names).
function seedDeal() {
  return {
    id: 'deal-001',
    opNumber: 1,
    createdAt: '2026-06-12',
    creditoMonto: 32699.85,
    anticipoMonto: 9000,
    anticipoFecha: '2026-06-12',
    tiers: defaultTiersA(),
    tierPreset: 'A',
    status: 'outstanding',
    pagoFecha: null,
    pagoMonto: null,
    viaAvisoDeCesion: false,
    aprobado: false,
    aprobadoFecha: null
  };
}

/* ============ EMAIL (auto-send via EmailJS) ============
   Browser-only files can't send mail directly; EmailJS relays it.
   DROP-IN: paste the three keys from your EmailJS account below.
   Until then, sending is skipped gracefully (the app still works). */
const EMAIL_CONFIG = {
  serviceId:  '',   // <-- EmailJS Service ID
  templateId: '',   // <-- EmailJS Template ID
  publicKey:  '',    // <-- EmailJS Public Key
  to: 'aa@mlggroup.com, vm@mlggroup.com'
};

function emailConfigured() {
  return EMAIL_CONFIG.serviceId && EMAIL_CONFIG.templateId && EMAIL_CONFIG.publicKey;
}

// Sends a NON-SENSITIVE summary by default (numbers only). The full documents
// are generated on screen for download. If you want the documents' text in the
// email too, pass docsText — but remember that carries names/cédulas.
async function sendDealEmail(summaryText) {
  if (!emailConfigured()) return { skipped: true };
  if (typeof emailjs === 'undefined') return { skipped: true, reason: 'emailjs not loaded' };
  try {
    emailjs.init({ publicKey: EMAIL_CONFIG.publicKey });
    await emailjs.send(EMAIL_CONFIG.serviceId, EMAIL_CONFIG.templateId, {
      to_email: EMAIL_CONFIG.to,
      subject: 'BBF — New operation recorded',
      message: summaryText
    });
    return { sent: true };
  } catch (e) {
    return { error: String(e) };
  }
}

/* ============ NUMBER TO WORDS (Spanish currency — for documents) ============ */
const UNIDADES = ["", "UNO", "DOS", "TRES", "CUATRO", "CINCO", "SEIS", "SIETE", "OCHO", "NUEVE"];
const DECENAS = ["", "DIEZ", "VEINTE", "TREINTA", "CUARENTA", "CINCUENTA", "SESENTA", "SETENTA", "OCHENTA", "NOVENTA"];
const DIECI = ["DIEZ", "ONCE", "DOCE", "TRECE", "CATORCE", "QUINCE", "DIECISÉIS", "DIECISIETE", "DIECIOCHO", "DIECINUEVE"];
const VEINTI = ["VEINTE", "VEINTIUNO", "VEINTIDÓS", "VEINTITRÉS", "VEINTICUATRO", "VEINTICINCO", "VEINTISÉIS", "VEINTISIETE", "VEINTIOCHO", "VEINTINUEVE"];
const CENTENAS = ["", "CIENTO", "DOSCIENTOS", "TRESCIENTOS", "CUATROCIENTOS", "QUINIENTOS", "SEISCIENTOS", "SETECIENTOS", "OCHOCIENTOS", "NOVECIENTOS"];

function dosDigitos(n, apocope) {
  if (n === 0) return "";
  if (n < 10) return apocope && n === 1 ? "UN" : UNIDADES[n];
  if (n < 20) return DIECI[n - 10];
  if (n < 30) return apocope && n === 21 ? "VEINTIÚN" : VEINTI[n - 20];
  const d = Math.floor(n / 10), u = n % 10;
  if (u === 0) return DECENAS[d];
  return DECENAS[d] + " Y " + (apocope && u === 1 ? "UN" : UNIDADES[u]);
}
function tresDigitos(n, apocope) {
  if (n === 0) return "";
  if (n === 100) return "CIEN";
  const c = Math.floor(n / 100), resto = n % 100;
  let out = "";
  if (c > 0) out += CENTENAS[c];
  if (resto > 0) out += (out ? " " : "") + dosDigitos(resto, apocope);
  return out;
}
function enterosATexto(n) {
  if (n === 0) return "CERO";
  n = Math.floor(n);
  const millones = Math.floor(n / 1000000);
  const miles = Math.floor((n % 1000000) / 1000);
  const resto = n % 1000;
  let partes = [];
  if (millones > 0) partes.push(millones === 1 ? "UN MILLÓN" : tresDigitos(millones, false) + " MILLONES");
  if (miles > 0) {
    const esUltimo = resto === 0;
    partes.push(miles === 1 ? "MIL" : tresDigitos(miles, esUltimo) + " MIL");
  }
  if (resto > 0) partes.push(tresDigitos(resto, true));
  return partes.join(" ");
}
function montoATexto(amount) {
  const fixed = Math.round(amount * 100) / 100;
  const enteros = Math.floor(fixed);
  const centavos = Math.round((fixed - enteros) * 100);
  const centavosStr = String(centavos).padStart(2, "0");
  const textoEnteros = enterosATexto(enteros);
  const formatted = fmtMoney(fixed);
  return `${textoEnteros} DÓLARES CON ${centavosStr}/100 (US$${formatted})`;
}
function fmtMoney(n) {
  return (Math.round(n * 100) / 100).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

/* ============ TIER / FEE CALCULATOR ============ */
function defaultTiers() { return defaultTiersA(); }
function defaultTiersA() {
  return [
    { label: 1, dayStart: 0, dayEnd: 15, pct: 20, legal: 250.00 },
    { label: 2, dayStart: 16, dayEnd: 29, pct: 30, legal: 312.50 },
    { label: 3, dayStart: 30, dayEnd: null, pct: 40, legal: 390.63, monthlyDefaultInterest: 2 }
  ];
}
function defaultTiersB() {
  return [
    { label: 1, dayStart: 0, dayEnd: 15, pct: 10, legal: 250.00 },
    { label: 2, dayStart: 16, dayEnd: 29, pct: 15, legal: 312.50 },
    { label: 3, dayStart: 30, dayEnd: null, pct: 20, legal: 390.63, monthlyDefaultInterest: 2 }
  ];
}
function tiersForPreset(preset) {
  return preset === 'B' ? defaultTiersB() : defaultTiersA();
}
function round2(n) { return Math.round(n * 100) / 100; }
function computeTierRow(advance, tier) {
  const commission = round2(advance * (tier.pct / 100));
  const total = round2(advance + commission + tier.legal);
  return { ...tier, commission, total };
}
function addDays(dateStr, days) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d;
}
function buildTierTable(advance, tiers, startDateStr) {
  return tiers.map(t => {
    const row = computeTierRow(advance, t);
    row.periodStart = addDays(startDateStr, t.dayStart);
    row.periodEnd = t.dayEnd === null ? null : addDays(startDateStr, t.dayEnd);
    return row;
  });
}
function daysBetween(startStr, endStr) {
  const a = new Date(startStr + 'T00:00:00');
  const b = new Date(endStr + 'T00:00:00');
  return Math.floor((b - a) / (1000 * 60 * 60 * 24));
}
function tierForDay(tiers, day) {
  for (const t of tiers) {
    if (t.dayEnd === null) { if (day >= t.dayStart) return t; }
    else if (day >= t.dayStart && day <= t.dayEnd) return t;
  }
  return tiers[tiers.length - 1];
}
function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

/* ============ DATE FORMATTING (Spanish) ============ */
const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
function fechaLarga(dateStr) {
  if (!dateStr) return '[fecha pendiente]';
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getDate()} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`;
}
function fechaCorta(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  return `${String(d.getDate()).padStart(2,'0')} ${MESES[d.getMonth()].slice(0,3)} ${d.getFullYear()}`;
}
function fechaCortaFromDate(d) {
  return `${String(d.getDate()).padStart(2,'0')} ${MESES[d.getMonth()].slice(0,3)} ${d.getFullYear()}`;
}

/* ============ DATE FORMATTING (English — for the UI) ============ */
const MONTHS_EN = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function dateShort(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'T00:00:00');
  return `${MONTHS_EN[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Contracts "de" + referencia into "del ..." when referencia starts with "el ",
// so "derivado ${refDe(x)}" reads correctly regardless of how the text was typed.
function refDe(referencia) {
  const r = String(referencia || '').trim();
  if (/^el\s+/i.test(r)) return 'del ' + r.replace(/^el\s+/i, '');
  return 'de ' + r;
}

/* ============ KPIs ============ */
function computeKPIs() {
  let outstandingSum = 0, outstandingCount = 0;
  let totalCollected = 0, totalFeeRevenue = 0, paidCount = 0;
  let daysSum = 0;
  let tierCounts = { 1: 0, 2: 0, 3: 0 };
  let defaultCount = 0;

  DEALS.forEach(d => {
    if (d.status === 'outstanding' || d.status === 'pendingApproval') {
      outstandingSum += d.anticipoMonto;
      outstandingCount++;
    }
    if (d.status === 'paid') {
      paidCount++;
      const days = daysBetween(d.anticipoFecha, d.pagoFecha);
      const tier = tierForDay(d.tiers, Math.max(days, 0));
      const row = computeTierRow(d.anticipoMonto, tier);
      totalCollected += d.pagoMonto != null ? d.pagoMonto : row.total;
      totalFeeRevenue += row.commission + row.legal;
      daysSum += days;
      tierCounts[tier.label] = (tierCounts[tier.label] || 0) + 1;
      if (tier.label === 3) defaultCount++;
    }
  });

  return {
    outstandingSum, outstandingCount,
    totalCollected, totalFeeRevenue, paidCount,
    avgDays: paidCount ? Math.round(daysSum / paidCount) : null,
    tierCounts, defaultRate: paidCount ? Math.round((defaultCount / paidCount) * 100) : 0
  };
}

/* ============ NEW OPERATION WIZARD ============ */
const MAX_ADVANCE_PCT = 0.60; // cash advance can never exceed 60% of the receivable
let WIZ = null;

function freshWiz() {
  return {
    step: 1,
    tierPreset: 'A',
    empresa: '', rep1Nombre: '', rep1Cedula: '',
    rep2Nombre: '', rep2Cedula: '', testigo: '',
    deudorNombre: '',
    creditoMonto: '', creditoDesc: '',
    anticipoMonto: '', anticipoFecha: todayStr(),
    notas: ''
  };
}

function renderNuevoView() {
  if (!WIZ) WIZ = freshWiz();

  let body = '';
  if (step === 1) body = wizStepTarifa();

// Pull whatever's currently in the DOM step inputs into WIZ state.
function saveWizFromDom() {
  const view = document.getElementById('view-nuevo');
  if (!view) return;
  const grab = (name) => {
    const el = view.querySelector(`[name="${name}"]`);
    return el ? el.value : undefined;
  };
  const checkedTier = view.querySelector('input[name="tierPreset"]:checked');
  if (checkedTier) WIZ.tierPreset = checkedTier.value === 'B' ? 'B' : 'A';
  ['empresa','rep1Nombre','rep1Cedula','rep2Nombre','rep2Cedula','testigo',
   'deudorNombre','creditoDesc','creditoMonto','anticipoMonto','anticipoFecha','notas'
  ].forEach(k => { const v = grab(k); if (v !== undefined) WIZ[k] = v; });
}

function wizValidateStep(step) {
  if (step === 2) {
    if (!WIZ.empresa.trim()) return 'Company name is required.';
    if (!WIZ.rep1Nombre.trim()) return 'Representative name is required.';
    if (!WIZ.rep1Cedula.trim()) return 'Representative ID is required.';
  }
  if (step === 3) {
    if (!WIZ.deudorNombre.trim()) return 'The company that owes is required.';
    if (!WIZ.creditoDesc.trim()) return 'Describe the payment being assigned.';
  }
  if (step === 4) {
    const rec = parseFloat(WIZ.creditoMonto);
    const adv = parseFloat(WIZ.anticipoMonto);
    if (!Number.isFinite(rec) || rec <= 0) return 'Enter the total owed.';
    if (!Number.isFinite(adv) || adv <= 0) return 'Enter the cash to hand over.';
    if (adv > rec * MAX_ADVANCE_PCT + 0.005) {
      return `Cash (US$${fmtMoney(adv)}) exceeds the 60% limit. Maximum: US$${fmtMoney(rec * MAX_ADVANCE_PCT)}.`;
    }
    if (!WIZ.anticipoFecha) return 'Advance date is required.';
  }
  return null;
}

function wizNext() {
  saveWizFromDom();
  const err = wizValidateStep(WIZ.step);
  if (err) { showToast(err); return; }
  if (WIZ.step < WIZ_TOTAL_STEPS) {
    WIZ.step++;
    renderNuevoView();
  } else {
    finalizeWizDeal();
  }
}

function wizBack() {
  saveWizFromDom();
  if (WIZ.step > 1) { WIZ.step--; renderNuevoView(); }
}

// Holds the full deal (with names/cédulas) for the current result screen ONLY.
// Never persisted. Cleared when leaving the result view.
let LAST_FULL_DEAL = null;

async function finalizeWizDeal() {
  const preset = WIZ.tierPreset === 'B' ? 'B' : 'A';
  const tiers = tiersForPreset(preset);
  const id = 'deal-' + Date.now();
  const opNumber = nextOpNumber();
  const advance = parseFloat(WIZ.anticipoMonto);
  const receivable = parseFloat(WIZ.creditoMonto);

  // 1) TRANSIENT full object — used to generate documents + email, then dropped.
  const fullDeal = {
    id, opNumber,
    createdAt: todayStr(),
    cedente: {
      empresa: WIZ.empresa.trim(),
      rep1Nombre: WIZ.rep1Nombre.trim(),
      rep1Cedula: WIZ.rep1Cedula.trim(),
      rep2Nombre: WIZ.rep2Nombre.trim(),
      rep2Cedula: WIZ.rep2Cedula.trim()
    },
    deudorCedido: { nombre: WIZ.deudorNombre.trim() },
    contrato: { referencia: WIZ.creditoDesc.trim() },
    credito: { monto: receivable, descripcion: WIZ.creditoDesc.trim() },
    anticipo: { monto: advance, fecha: WIZ.anticipoFecha },
    factor: { nombre: 'Ariel Ashouri Levy', cedula: '8-774-2065' },
    testigo: WIZ.testigo.trim(),
    lugar: 'Ciudad de Panamá',
    tiers, tierPreset: preset,
    // fields the document generators expect for an outstanding deal:
    status: 'outstanding', pagoFecha: null, pagoMonto: null,
    viaAvisoDeCesion: false, aprobado: false, aprobadoFecha: null, notas: ''
  };
  LAST_FULL_DEAL = fullDeal;

  // 2) STORED record — NUMBERS ONLY. No names, no cédulas, no debtor.
  const stored = {
    id, opNumber,
    createdAt: todayStr(),
    creditoMonto: receivable,
    anticipoMonto: advance,
    anticipoFecha: WIZ.anticipoFecha,
    tiers, tierPreset: preset,
    status: 'outstanding',
    pagoFecha: null, pagoMonto: null,
    viaAvisoDeCesion: false,
    aprobado: false, aprobadoFecha: null
  };
  DEALS.push(stored);
  await saveDeals();

  // 3) Auto-email a NON-SENSITIVE summary (numbers only).
  const summary =
    `New operation recorded.\n\n` +
    `Operation #: ${opNumber}\n` +
    `Rate: ${preset} (${tiers.map(t=>t.pct+'%').join(' / ')})\n` +
    `Total owed: US$${fmtMoney(receivable)}\n` +
    `Cash advanced: US$${fmtMoney(advance)}\n` +
    `Advance date: ${dateShort(WIZ.anticipoFecha)}\n\n` +
    `Documents were generated for download in the app.`;
  const emailRes = await sendDealEmail(summary);

  WIZ.step = 5;
  WIZ.lastDealId = id;
  if (emailRes && emailRes.sent) showToast('Saved. Documents generated. Email sent.');
  else showToast('Saved. Documents generated.');
  renderNuevoView();
}

function renderDealResult(el) {
  const deal = LAST_FULL_DEAL;
  if (!deal) {
    // Full data is gone (e.g. page reloaded). Documents can't be regenerated
    // because names/IDs are never stored — by design.
    el.innerHTML = `
      <div class="wiz-wrap">
        <h1 class="page-title">Done</h1>
        <p class="page-sub">This operation is recorded. For privacy, documents are generated once and aren't stored here. Start a new operation if you need to regenerate them.</p>
        <div class="wiz-nav no-print"><span></span>
          <button type="button" class="btn gold" data-wiz="new">New operation</button>
        </div>
      </div>`;
    return;
  }
  el.innerHTML = `
    <div class="wiz-wrap">
      <h1 class="page-title">Documents ready</h1>
      <p class="page-sub">Operation #${deal.opNumber} &middot; Rate ${esc(deal.tierPreset)} &middot; Cash US$${fmtMoney(deal.anticipo.monto)}</p>
      <p class="hint" style="margin:-12px 0 18px;">${emailConfigured() ? 'A summary was emailed to you and your assistant.' : 'Download the documents below. (Auto-email is not set up yet.)'} Names and IDs are not saved to the dashboard.</p>
      <div class="wiz-nav no-print" style="margin-bottom:18px;">

}

function renderDocPreview(containerId, deal) {
  const keys = Object.keys(DOC_GENERATORS);
  let active = keys[0];
  const container = document.getElementById(containerId);

  function paint() {
    container.innerHTML = `
      <div class="card no-print" style="background:var(--paper);border:none;padding:0;">
        <div class="doc-tabs">
          ${keys.map(k => `<button data-doc="${k}" class="${k===active?'active':''}">${DOC_GENERATORS[k].label}</button>`).join('')}
          <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
            <button class="btn ghost small" id="btn-copy">Copy text</button>
            <button class="btn small" id="btn-print">Print / Save PDF</button>
          </div>
        </div>
      </div>
      <div class="doc-page" id="doc-render">${DOC_GENERATORS[active].fn(deal)}</div>
    `;
    container.querySelectorAll('.doc-tabs button[data-doc]').forEach(b => {
      b.addEventListener('click', () => { active = b.dataset.doc; paint(); });
    });
    container.querySelector('#btn-print').addEventListener('click', () => window.print());
    container.querySelector('#btn-copy').addEventListener('click', () => {
      const text = container.querySelector('#doc-render').innerText;
      navigator.clipboard.writeText(text).then(() => showToast('Text copied.'));
    });
  }
  paint();
}

/* ============ MODALS ============ */
function modalShell(innerHTML) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-backdrop" id="modal-backdrop"><div class="modal">${innerHTML}</div></div>`;
  document.getElementById('modal-backdrop').addEventListener('click', (e) => {
    if (e.target.id === 'modal-backdrop') closeModal();
  });
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

function openMarkPaidModal(dealId) {
  const deal = DEALS.find(d => d.id === dealId);
  const days = daysBetween(deal.anticipoFecha, todayStr());
  const tier = tierForDay(deal.tiers, Math.max(days,0));
  const row = computeTierRow(deal.anticipoMonto, tier);
  modalShell(`
    <div class="modal-head"><h3>Mark as paid</h3><button class="btn ghost small" id="modal-x">Close</button></div>
    <div class="modal-body">
      <p style="margin-top:0;color:var(--muted);">Operation #${deal.opNumber} &mdash; advance US$${fmtMoney(deal.anticipoMonto)}</p>
      <div class="field"><label>Payment date</label><input type="date" id="pago-fecha" value="${todayStr()}"></div>
      <div class="field"><label>Amount collected (US$)</label><input type="number" step="0.01" id="pago-monto" value="${row.total}"></div>
      <div class="field"><label><input type="checkbox" id="via-aviso" style="width:auto;margin-right:6px;">Collected directly from the debtor via Notice of Assignment</label></div>
      <p class="hint">This waits for approval on the dashboard before it counts as closed.</p>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" id="modal-cancel">Cancel</button>
      <button class="btn gold" id="modal-submit">Report payment</button>
    </div>
  `);
  document.getElementById('modal-x').addEventListener('click', closeModal);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-submit').addEventListener('click', async () => {
    deal.status = 'pendingApproval';
    deal.pagoFecha = document.getElementById('pago-fecha').value;
    deal.pagoMontoPropuesto = parseFloat(document.getElementById('pago-monto').value);
    deal.viaAvisoDeCesion = document.getElementById('via-aviso').checked;
    await saveDeals();
    closeModal();
    showToast('Payment reported. Awaiting approval.');
    renderPanelView();
  });
}

async function approveDeal(dealId) {
  const deal = DEALS.find(d => d.id === dealId);
  deal.status = 'paid';
  deal.pagoMonto = deal.pagoMontoPropuesto;
  deal.aprobado = true;
  deal.aprobadoFecha = todayStr();
  await saveDeals();
  showToast('Payment approved. Operation closed.');
  renderPanelView();
}

async function revertDeal(dealId) {
  const deal = DEALS.find(d => d.id === dealId);
  deal.status = 'outstanding';
  deal.pagoFecha = null; deal.pagoMontoPropuesto = null; deal.viaAvisoDeCesion = false;
  await saveDeals();
  showToast('Reverted to open.');
  renderPanelView();
}

function openDeleteModal(dealId) {
  if (!isMaster()) { showToast('Only the master user can delete.'); return; }
  const deal = DEALS.find(d => d.id === dealId);
  modalShell(`
    <div class="modal-head"><h3>Delete operation #${deal.opNumber}?</h3><button class="btn ghost small" id="modal-x">Close</button></div>
    <div class="modal-body">
      <p style="margin-top:0;">This permanently removes operation #${deal.opNumber} (advance US$${fmtMoney(deal.anticipoMonto)}) from the dashboard. This can't be undone.</p>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" id="modal-cancel">Cancel</button>
      <button class="btn gold" id="modal-delete">Delete</button>
    </div>
  `);
  document.getElementById('modal-x').addEventListener('click', closeModal);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-delete').addEventListener('click', async () => {
    DEALS = DEALS.filter(d => d.id !== dealId);
    await saveDeals();
    closeModal();
    showToast('Operation deleted.');
    renderPanelView();
  });
}

// Detail modal: financial breakdown only. Documents are NOT shown here because
// names/IDs are never stored — by design. Tier table is fully reconstructable
// from the stored numbers.
function openDetailModal(dealId) {
  const deal = DEALS.find(d => d.id === dealId);
  const table = buildTierTable(deal.anticipoMonto, deal.tiers, deal.anticipoFecha);
  const days = daysBetween(deal.anticipoFecha, todayStr());
  const curTier = tierForDay(deal.tiers, Math.max(days, 0));
  modalShell(`
    <div class="modal-head"><h3>Operation #${deal.opNumber}</h3><button class="btn ghost small" id="modal-x">Close</button></div>
    <div class="modal-body">
      <p style="margin-top:0;color:var(--muted);font-size:13px;">
        Rate ${esc(deal.tierPreset || 'A')} &middot; Total owed US$${fmtMoney(deal.creditoMonto)} &middot; Cash advanced US$${fmtMoney(deal.anticipoMonto)} &middot; Advanced ${dateShort(deal.anticipoFecha)}
        ${deal.status === 'paid' ? ` &middot; Collected US$${fmtMoney(deal.pagoMonto)} on ${dateShort(deal.pagoFecha)}` : ` &middot; ${days} days elapsed (now in tier ${curTier.label})`}
      </p>
      <table class="ledger" style="margin-top:10px;">
        <tr><th>Tier</th><th>Window</th><th>Commission</th><th>Legal</th><th>Total to repay</th></tr>
        ${table.map(r => `
          <tr${r.label===curTier.label && deal.status!=='paid' ? ' style="background:rgba(255,255,255,0.05);"' : ''}>
            <td>Tier ${r.label} (${r.pct}%)</td>
            <td>${dateShort(r.periodStart.toISOString().slice(0,10))}${r.periodEnd ? ' – ' + dateShort(r.periodEnd.toISOString().slice(0,10)) : '+'}</td>
            <td class="num">US$${fmtMoney(r.commission)}</td>
            <td class="num">US$${fmtMoney(r.legal)}</td>
            <td class="num">US$${fmtMoney(r.total)}</td>
          </tr>`).join('')}
      </table>
      <p class="hint" style="margin-top:12px;">Documents (with names and IDs) were generated when this operation was created and emailed. They aren't stored here for privacy.</p>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" id="modal-x2">Close</button>
    </div>
  `);
  document.getElementById('modal-x').addEventListener('click', closeModal);
  document.getElementById('modal-x2').addEventListener('click', closeModal);
}

/* ============ NAV / INIT ============ */
function setView(view) {
  CURRENT_VIEW = view;
  document.querySelectorAll('nav button[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  if (view === 'nuevo') renderNuevoView();
  if (view === 'panel') renderPanelView();
}

// Single delegated handler for all app actions. Attached once to document,
// so it works no matter when/how elements are (re)rendered via innerHTML.
let DELEGATION_WIRED = false;
function wireDelegation() {
  if (DELEGATION_WIRED) return;
  DELEGATION_WIRED = true;
  document.addEventListener('click', (e) => {
    const navBtn = e.target.closest('nav button[data-view]');
    if (navBtn) { setView(navBtn.dataset.view); return; }

    const markPaid = e.target.closest('[data-mark-paid]');
    if (markPaid) { openMarkPaidModal(markPaid.dataset.markPaid); return; }

    const approve = e.target.closest('[data-approve]');
    if (approve) { approveDeal(approve.dataset.approve); return; }

    const reject = e.target.closest('[data-reject]');
    if (reject) { revertDeal(reject.dataset.reject); return; }

    const del = e.target.closest('[data-delete]');
    if (del) { openDeleteModal(del.dataset.delete); return; }

    const detailRow = e.target.closest('[data-detail]');
    if (detailRow && !e.target.closest('button')) { openDetailModal(detailRow.dataset.detail); return; }

    const wizBtn = e.target.closest('[data-wiz]');
    if (wizBtn) {
      const a = wizBtn.dataset.wiz;
      if (a === 'next') wizNext();
      else if (a === 'back') wizBack();
      else if (a === 'new') { WIZ = freshWiz(); LAST_FULL_DEAL = null; renderNuevoView(); }
      else if (a === 'goPanel') { LAST_FULL_DEAL = null; WIZ = freshWiz(); setView('panel'); }
      return;
    }

    const tarifaCard = e.target.closest('.tarifa-card');
    if (tarifaCard) {
      const radio = tarifaCard.querySelector('input[name="tierPreset"]');
      if (radio) { radio.checked = true; if (WIZ) WIZ.tierPreset = radio.value === 'B' ? 'B' : 'A'; }
      return;
    }
  });

  // Live 60%-cap hint as the amounts are typed in the wizard.
  document.addEventListener('input', (e) => {
    if (e.target && (e.target.id === 'wiz-credito' || e.target.id === 'wiz-anticipo')) {
      const rec = parseFloat(document.getElementById('wiz-credito').value);
      const adv = parseFloat(document.getElementById('wiz-anticipo').value);
      const hint = document.getElementById('wiz-cap-hint');
      if (!hint) return;
      if (!Number.isFinite(rec) || rec <= 0) {
        hint.textContent = 'Enter the total owed first.';
        hint.style.color = '';
        return;
      }
      const max = rec * MAX_ADVANCE_PCT;
      if (Number.isFinite(adv) && adv > max + 0.005) {
        hint.textContent = `Exceeds 60%. Maximum cash: US$${fmtMoney(max)}`;
        hint.style.color = 'var(--rust)';
      } else {
        hint.textContent = `Maximum cash (60%): US$${fmtMoney(max)}`;
        hint.style.color = '';
      }
    }
  });
}

async function init() {
  wireDelegation();
  await loadDeals();
  setView('nuevo');
}

/* ============ LOGIN GATE ============ */
// Client-side check only — a determined person with the file could brute-force
// this offline. It blocks casual/accidental access if the link leaks, not a
// real adversary. The dashboard stores no sensitive data, so this is adequate
// for a two-person internal tool. Synchronous, dependency-free hash.
// Maps credential hash -> username. User "1" is master (can delete).
const AUTH_USERS = {
  '908ec7b251f092ee': '1',   // 1 / davinci88  (master)
  '5a380285fdd225d1': 'v'    // v / sandysandy33 (everything except delete)
};

function simpleHash(str) {
  let h1 = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    h1 ^= str.charCodeAt(i);
    h1 = Math.imul(h1, 0x01000193);
  }
  let h2 = 0x9e3779b9;
  for (let i = str.length - 1; i >= 0; i--) {
    h2 ^= str.charCodeAt(i);
    h2 = Math.imul(h2, 0x85ebca6b);
  }
  return (h1 >>> 0).toString(16).padStart(8, '0') + (h2 >>> 0).toString(16).padStart(8, '0');
}

function bootLoginGate() {
  const loginBtn = document.getElementById('login-btn');
  const userInput = document.getElementById('login-user');
  const passInput = document.getElementById('login-pass');
  const logoutBtn = document.getElementById('logout-btn');
  if (!loginBtn || !userInput || !passInput || !logoutBtn) {
    setTimeout(bootLoginGate, 50);
    return;
  }
  function attemptLogin() {
    const user = (userInput.value || '').trim().toLowerCase();
    const pass = passInput.value || '';
    const hash = simpleHash(`${user}:${pass}`);
    const matchedUser = AUTH_USERS[hash];
    if (matchedUser) {
      doLogin(matchedUser);
    } else {
      document.getElementById('login-error').style.display = 'block';
      passInput.value = '';
    }
  }
  loginBtn.addEventListener('click', attemptLogin);
  passInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') attemptLogin(); });
  userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') attemptLogin(); });
  logoutBtn.addEventListener('click', () => location.reload());

  // Touch ID (WebAuthn) — wire buttons and show/hide based on availability.
  setupTouchIdUI();
}

function doLogin(user) {
  CURRENT_USER = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-root').style.display = '';
  const tag = document.getElementById('user-tag');
  if (tag) tag.textContent = user === '1' ? 'Master' : 'User v';
  // Offer Touch ID enrollment to the master once signed in (if available & not set).
  const enableBtn = document.getElementById('enable-touchid-btn');
  if (enableBtn) {
    const show = (user === '1') && webauthnAvailable() && !passkeyRegistered();
    enableBtn.style.display = show ? '' : 'none';
  }
  init();
}

/* ===== Touch ID via WebAuthn (platform authenticator) =====
   Works only over HTTPS (your live GitHub Pages URL), not file:// or the
   preview. It's a local convenience unlock tied to THIS Mac and THIS site,
   layered on top of the password (which always remains as backup). A
   successful Touch ID prompt unlocks as the master user. */
const PASSKEY_LS = 'bbf-passkey-v1';

function webauthnAvailable() {
  try {
    return !!(window.PublicKeyCredential && navigator.credentials &&
              window.isSecureContext && location.hostname);
  } catch (e) { return false; }
}
function passkeyRegistered() {
  try { return !!localStorage.getItem(PASSKEY_LS); } catch (e) { return false; }
}
function bufToB64url(buf) {
  const bytes = new Uint8Array(buf);
  let s = '';
  for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
  return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function b64urlToBuf(s) {
  s = s.replace(/-/g,'+').replace(/_/g,'/');
  while (s.length % 4) s += '=';
  const bin = atob(s);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}
function randomBytes(n) {
  const b = new Uint8Array(n);
  (window.crypto || {}).getRandomValues && window.crypto.getRandomValues(b);
  return b;
}

async function registerPasskey() {
  if (!webauthnAvailable()) { showToast('Touch ID needs the live HTTPS site (not the local file).'); return; }
  try {
    const cred = await navigator.credentials.create({
      publicKey: {
        challenge: randomBytes(32),
        rp: { name: 'Bay Bay Capital', id: location.hostname },
        user: { id: randomBytes(16), name: 'master', displayName: 'Master' },
        pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
        authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required', residentKey: 'preferred' },
        timeout: 60000,
        attestation: 'none'
      }
    });
    const rec = { credId: bufToB64url(cred.rawId), user: '1' };
    localStorage.setItem(PASSKEY_LS, JSON.stringify(rec));
    showToast('Touch ID enabled on this Mac.');
    const enableBtn = document.getElementById('enable-touchid-btn');
    if (enableBtn) enableBtn.style.display = 'none';
  } catch (e) {
    showToast('Could not enable Touch ID. ' + (e && e.name ? e.name : ''));
  }
}

async function unlockWithPasskey() {
  if (!webauthnAvailable() || !passkeyRegistered()) return;
  try {
    const rec = JSON.parse(localStorage.getItem(PASSKEY_LS));
    await navigator.credentials.get({
      publicKey: {
        challenge: randomBytes(32),
        allowCredentials: [{ type: 'public-key', id: b64urlToBuf(rec.credId) }],
        userVerification: 'required',
        timeout: 60000,
        rpId: location.hostname
      }
    });
    // A successful assertion required the fingerprint — unlock.
    doLogin(rec.user || '1');
  } catch (e) {
    showToast('Touch ID was cancelled or failed.');
  }
}

function setupTouchIdUI() {
  const unlockBtn = document.getElementById('touchid-unlock-btn');
  const enableBtn = document.getElementById('enable-touchid-btn');
  if (unlockBtn) {
    unlockBtn.addEventListener('click', unlockWithPasskey);
    unlockBtn.style.display = (webauthnAvailable() && passkeyRegistered()) ? '' : 'none';
  }
  if (enableBtn) {
    enableBtn.addEventListener('click', registerPasskey);
    enableBtn.style.display = 'none'; // shown after master signs in (see doLogin)
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootLoginGate);
} else {
  bootLoginGate();
}
